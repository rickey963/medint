name: Medint Auto-Update (Scrape & Deploy)

on:
  schedule:
    # The 10 Google News queries (split across sources.py's groups so big
    # publishers don't crowd out small ones) now run concurrently instead of
    # sequentially, which cut the scrape step from ~12 minutes to ~4.5. Add the
    # checkout/pip/npm/build/deploy steps around it and a full workflow run is
    # ~7-9 minutes, so a 10-minute cron leaves headroom without the 2-3x
    # overlap a 5-minute cron would cause.
    # Offset to :03/:13/:23... instead of the exact :00/:10/:20 boundary —
    # GitHub's scheduler queues everyone's round-number cron ticks together,
    # and under load it silently drops ticks rather than just delaying them
    # (observed: a 6-11h gap with zero schedule-triggered runs even though
    # the workflow stayed "active"). Off-the-hour minutes see far less queue
    # contention.
    - cron: '3-59/10 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  # Schedule and push triggers can land close together; queue them instead of
  # running in parallel so they don't race on the same git push / Pages deploy.
  group: medint-auto-update
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # A push made with the default GITHUB_TOKEN deliberately does not
          # trigger this workflow's own `push` trigger (GitHub's anti-loop
          # guard) — that's why GitHub's flaky native cron was the only thing
          # keeping this alive, and why it died for hours whenever a tick was
          # dropped. A PAT isn't subject to that guard, so pushing with it
          # makes each run's commit kick off the next run immediately,
          # turning this into a self-sustaining chain that doesn't depend on
          # the schedule firing at all.
          token: ${{ secrets.ACTIONS_PUSH_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Scraper Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f scraper/requirements.txt ]; then pip install -r scraper/requirements.txt; fi

      - name: Run All Scrapers
        run: python scraper/engine.py

      - name: Throttle self-trigger cadence
        # The self-trigger chain (see the checkout step's PAT comment) was
        # firing every ~1.5-3 minutes - GitHub Actions runners share IP ranges
        # with thousands of other jobs, and Google News appears to start
        # serving a stale cached result set to a heavily-querying IP rather
        # than erroring outright: verified directly - a query run from this
        # IP range returned the *same* ~100 items, frozen at one point in
        # time for 2.5+ hours straight, while the identical query from a
        # residential IP kept advancing normally the whole time. Forcing each
        # cycle to take at least this long paces our own request rate down to
        # something that keeps getting genuinely fresh results instead of a
        # frozen cache, at the cost of a slower (but actually current) feed.
        run: sleep 300

      - name: Commit and Push Data Updates
        run: |
          git config --local user.email "rickey@o2.pl"
          git config --local user.name "rickey963"
          git add src/data/*.json
          # Always touch a heartbeat file so there's always something to
          # commit, even when the scrape finds zero new articles. Without
          # this, a quiet news cycle means no push, which means no
          # self-trigger, which means the chain stalls until the unreliable
          # `schedule` cron happens to fire again.
          mkdir -p src/data
          date -u +%FT%TZ > src/data/.last_run
          git add src/data/.last_run
          if ! git diff --cached --quiet; then
            git commit -m "Automated Data Update: $(date)"
            # Retry loop to handle race conditions during concurrent runs
            for i in {1..5}; do
              echo "Attempt $i to push to origin main..."
              git fetch origin main
              git rebase origin/main -X theirs
              if git push origin main; then
                echo "Push successful!"
                break
              fi
              echo "Push failed, retrying in 10s..."
              sleep 10
            done
          else
            echo "No data changes detected, skipping commit."
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install Web Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
